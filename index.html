<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Take it easy</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Take it easy">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.07);
    --border-hover: rgba(0,0,0,0.13);
    --text-primary: #1A1A1A;
    --text-secondary: #888880;
    --text-muted: #BBBBB5;
    --radius-card: 18px;
    --radius-btn: 100px;
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 0 0 0.5px rgba(0,0,0,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.3px; color: var(--text-primary); }
  .btn-new {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-btn);
    border: 0.5px solid var(--border-hover);
    background: var(--surface); font-size: 13px; font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
  }
  .btn-new:hover { color: var(--text-primary); background: var(--bg); }
  .btn-new svg { width: 14px; height: 14px; }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--surface);
    border-radius: var(--radius-card);
    padding: 1.25rem 1.25rem 1rem;
    box-shadow: var(--shadow);
  }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .card-left { display: flex; align-items: center; gap: 11px; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
  }
  .card-name-row { display: flex; align-items: center; gap: 6px; }
  .card-name { font-size: 15px; font-weight: 500; letter-spacing: -0.1px; }
  .card-stats { display: flex; gap: 12px; margin-top: 4px; }
  .stat { font-size: 11px; color: var(--text-secondary); }
  .stat b { font-weight: 500; color: var(--text-primary); margin-right: 1px; font-size: 12px; }

  /* Checkin button */
  .btn-checkin {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: var(--radius-btn);
    border: 0.5px solid var(--border-hover);
    background: var(--surface); font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-checkin:hover:not(:disabled) { color: var(--text-primary); border-color: var(--text-muted); }
  .btn-checkin.done { border-color: transparent; color: var(--text-muted); cursor: default; background: transparent; }
  .btn-checkin svg { width: 13px; height: 13px; }

  /* Delete button */
  .btn-delete {
    width: 22px; height: 22px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .btn-delete { opacity: 1; }
  .btn-delete:hover { color: #E07070; }
  .btn-delete svg { width: 11px; height: 11px; }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .month-nav-title {
    font-size: 12px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.3px;
  }
  .month-nav-arrows { display: flex; align-items: center; gap: 2px; }
  .btn-arrow {
    width: 24px; height: 24px; border-radius: 6px;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .btn-arrow:hover { background: var(--bg); color: var(--text-primary); }
  .btn-arrow:disabled { opacity: 0.3; cursor: default; }
  .btn-arrow svg { width: 12px; height: 12px; }
  .btn-today {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    border: 0.5px solid var(--border-hover); background: transparent;
    color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-today:hover { color: var(--text-primary); }

  /* Heatmap calendar */
  .hm-calendar { width: 100%; }
  .hm-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .hm-weekday {
    font-size: 10px; color: var(--text-muted);
    text-align: center; padding: 2px 0;
  }
  .hm-days {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .hm-day {
    aspect-ratio: 1; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text-muted);
    position: relative; cursor: default;
    transition: opacity 0.1s;
  }
  .hm-day.empty { background: transparent; }
  .hm-day.inactive { background: var(--bg); color: var(--text-muted); }
  .hm-day.active { color: white; font-weight: 500; }
  .hm-day.today-ring { box-shadow: 0 0 0 1.5px var(--text-muted); }
  .hm-day.future { background: transparent; color: var(--text-muted); opacity: 0.3; }

  /* Empty state */
  .empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--text-muted); font-size: 14px; line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 1rem; opacity: 0.5; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: var(--radius-card);
    padding: 1.75rem; width: 100%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    transform: translateY(8px); transition: transform 0.2s;
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 1rem; }
  .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; padding: 9px 12px; border-radius: 10px;
    border: 0.5px solid var(--border-hover);
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text-primary);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--text-muted); }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .emoji-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 0.5px solid var(--border);
    background: var(--bg); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .emoji-btn:hover, .emoji-btn.selected { border-color: var(--border-hover); background: var(--surface); transform: scale(1.1); }
  .emoji-btn.selected { box-shadow: 0 0 0 1.5px var(--text-muted); }
  .color-grid { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .color-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: transform 0.1s; flex-shrink: 0;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.selected { border-color: var(--text-secondary); }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
  .btn-cancel {
    flex: 1; padding: 10px; border-radius: var(--radius-btn);
    border: 0.5px solid var(--border-hover);
    background: transparent; font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary); cursor: pointer;
  }
  .btn-confirm {
    flex: 2; padding: 10px; border-radius: var(--radius-btn);
    border: none; background: #1A1A1A; color: #fff;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-confirm:hover { opacity: 0.85; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1A1A1A; color: #fff; padding: 9px 18px;
    border-radius: var(--radius-btn); font-size: 13px;
    opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading bar */
  .loading-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, #B8A8D8, #8EC4A4, #F0A8A8);
    width: 0; transition: width 0.3s; z-index: 300;
  }

  @media (max-width: 480px) {
    .container { padding: 1.5rem 1rem 3rem; }
    .logo { font-size: 22px; }
    .card { padding: 1rem 1rem 0.85rem; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<div class="container">
  <header class="header">
    <div class="logo">Take it easy</div>
    <button class="btn-new" onclick="openModal()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/>
      </svg>
      新建事件
    </button>
  </header>
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>新建打卡事件</h2>
    <div class="form-row">
      <label class="form-label">事件名称</label>
      <input class="form-input" id="inputName" placeholder="例如：打鼓练习" maxlength="20">
    </div>
    <div class="form-row">
      <label class="form-label">选个图标</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-row">
      <label class="form-label">主题色</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="submitNewEvent()">创建</button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLHiJPQanEDWJRX-XS1SaQYf1Bb8Q94dan9107J_kijLsd555HFs0fsfYNpLttNNe-/exec';

const COLORS = [
  { on: '#B8A8D8', off: '#F0EEF8', bg: '#F0EEF8', key: 'purple' },
  { on: '#8EC4A4', off: '#EAF4EE', bg: '#EAF4EE', key: 'green'  },
  { on: '#F0A8A8', off: '#FDF0F0', bg: '#FDF0F0', key: 'pink'   },
  { on: '#A8C4D8', off: '#EEF4F8', bg: '#EEF4F8', key: 'blue'   },
  { on: '#C4C8A0', off: '#F2F4E8', bg: '#F2F4E8', key: 'sage'   },
  { on: '#D4A8C0', off: '#F8EEF4', bg: '#F8EEF4', key: 'rose'   },
];

const EMOJIS = ['🥁','💪','📖','🎸','🏃','🧘','✍️','🎨','🎵','🌱','🚴','🏊','🍳','🧠','💻','🎯','🌿','☕','🌈','🎈','🪁'];
const WEEKDAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let events = [];
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0].key;
// viewMonth[eventId] = { year, month } — which month each card is showing
const viewMonth = {};

// ── API (JSONP) ───────────────────────────────────────────────────────────────
function apiGet(action) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[cb] = (data) => { delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => { delete window[cb]; script.remove(); reject(new Error('network')); };
    script.src = APPS_SCRIPT_URL + '?action=' + action + '&callback=' + cb;
    document.head.appendChild(script);
  });
}

function apiPost(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[cb] = (data) => { delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => { delete window[cb]; script.remove(); reject(new Error('network')); };
    const params = encodeURIComponent(JSON.stringify({ action, ...payload }));
    script.src = APPS_SCRIPT_URL + '?callback=' + cb + '&data=' + params;
    document.head.appendChild(script);
  });
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function loadData() {
  setLoading(true);
  try {
    const data = await apiGet('getAll');
    events = data.events || [];
    renderAll();
  } catch(e) {
    showToast('加载失败，请检查网络');
  } finally {
    setLoading(false);
  }
}

async function doCheckin(eventId) {
  const today = todayStr();
  const ev = events.find(e => e.id === eventId);
  if (!ev || ev.records.includes(today)) return;
  ev.records.push(today);
  renderAll();
  try {
    await apiPost('checkin', { eventId, date: today });
    showToast('✓ 打卡成功');
  } catch(e) {
    ev.records = ev.records.filter(d => d !== today);
    renderAll();
    showToast('打卡失败，请重试');
  }
}

async function deleteEvent(eventId) {
  if (!confirm('确认删除这个打卡事件？记录也会一并删除。')) return;
  events = events.filter(e => e.id !== eventId);
  renderAll();
  try { await apiPost('deleteEvent', { eventId }); } catch(e) { showToast('删除失败'); }
}

async function saveNewEvent(ev) {
  events.push({ ...ev, records: [] });
  closeModal();
  renderAll();
  try {
    await apiPost('createEvent', ev);
    showToast('✓ 创建成功');
  } catch(e) { showToast('创建失败，请重试'); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  if (events.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div>还没有打卡事件<br>点击右上角创建第一个</div>`;
    return;
  }
  events.forEach(ev => container.appendChild(buildCard(ev)));
}

function buildCard(ev) {
  const color = COLORS.find(c => c.key === ev.colorKey) || COLORS[0];
  const today = todayStr();
  const checkedToday = ev.records.includes(today);
  const stats = calcStats(ev.records);
  const now = new Date();

  // Init view month for this card
  if (!viewMonth[ev.id]) {
    viewMonth[ev.id] = { year: now.getFullYear(), month: now.getMonth() };
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + ev.id;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-left">
        <div class="card-icon" style="background:${color.bg}">${ev.emoji}</div>
        <div>
          <div class="card-name-row">
            <div class="card-name">${ev.name}</div>
            <button class="btn-delete" onclick="deleteEvent('${ev.id}')" title="删除">
              <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/>
              </svg>
            </button>
          </div>
          <div class="card-stats">
            <div class="stat"><b>${stats.thisMonth}</b>本月</div>
            <div class="stat"><b>${stats.thisYear}</b>今年</div>
            <div class="stat"><b>${stats.total}</b>总计</div>
          </div>
        </div>
      </div>
      <div style="flex-shrink:0">
        <button class="btn-checkin ${checkedToday ? 'done' : ''}"
          onclick="doCheckin('${ev.id}')"
          ${checkedToday ? 'disabled' : ''}>
          ${checkedToday
            ? `<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,7 5,10 11,3"/></svg> 今日已打卡`
            : `<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="5"/><polyline points="4,6.5 6,8.5 9.5,4.5"/></svg> 打卡`
          }
        </button>
      </div>
    </div>
    <div id="hm-wrap-${ev.id}"></div>
  `;

  renderHeatmap(ev, color);
  return card;
}

function renderHeatmap(ev, color) {
  const wrap = document.getElementById('hm-wrap-' + ev.id);
  if (!wrap) return;
  if (!color) color = COLORS.find(c => c.key === ev.colorKey) || COLORS[0];

  const { year, month } = viewMonth[ev.id];
  const now = new Date();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  // Can't go before the earliest record or past today's month
  const hasNext = !(isCurrentMonth);
  // Find earliest possible month from records
  const allDates = ev.records.map(r => r).sort();
  const firstRecord = allDates[0];

  const monthLabel = MONTH_NAMES[month] + ' ' + year;

  // Build calendar grid
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayFull = todayStr();
  const recordSet = new Set(ev.records);

  let dayCells = '';
  // empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    dayCells += `<div class="hm-day empty"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isFuture = ds > todayFull;
    const isChecked = recordSet.has(ds);
    const isToday = ds === todayFull;
    let cls = 'hm-day';
    if (isFuture) cls += ' future';
    else if (isChecked) cls += ' active';
    else cls += ' inactive';
    if (isToday) cls += ' today-ring';
    const style = isChecked ? `background:${color.on};` : '';
    dayCells += `<div class="${cls}" style="${style}" title="${ds}">${d}</div>`;
  }

  wrap.innerHTML = `
    <div class="month-nav">
      <div class="month-nav-title">${monthLabel}</div>
      <div class="month-nav-arrows">
        ${!isCurrentMonth ? `<button class="btn-today" onclick="goToday('${ev.id}')">今天</button>` : ''}
        <button class="btn-arrow" onclick="changeMonth('${ev.id}',-1)">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8,2 4,6 8,10"/></svg>
        </button>
        <button class="btn-arrow" onclick="changeMonth('${ev.id}',1)" ${!hasNext ? 'disabled' : ''}>
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,2 8,6 4,10"/></svg>
        </button>
      </div>
    </div>
    <div class="hm-calendar">
      <div class="hm-weekdays">
        ${WEEKDAYS.map(w => `<div class="hm-weekday">${w}</div>`).join('')}
      </div>
      <div class="hm-days">${dayCells}</div>
    </div>
  `;
}

function changeMonth(eventId, delta) {
  const vm = viewMonth[eventId];
  let m = vm.month + delta;
  let y = vm.year;
  if (m > 11) { m = 0; y++; }
  if (m < 0)  { m = 11; y--; }
  // Don't go into future months
  const now = new Date();
  if (y > now.getFullYear() || (y === now.getFullYear() && m > now.getMonth())) return;
  viewMonth[eventId] = { year: y, month: m };
  const ev = events.find(e => e.id === eventId);
  if (ev) renderHeatmap(ev);
}

function goToday(eventId) {
  const now = new Date();
  viewMonth[eventId] = { year: now.getFullYear(), month: now.getMonth() };
  const ev = events.find(e => e.id === eventId);
  if (ev) renderHeatmap(ev);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0].key;
  document.getElementById('inputName').value = '';
  buildEmojiGrid();
  buildColorGrid();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 200);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function buildEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (em === selectedEmoji ? ' selected' : '');
    btn.textContent = em;
    btn.onclick = () => {
      selectedEmoji = em;
      grid.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}

function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (c.key === selectedColor ? ' selected' : '');
    btn.style.background = c.on;
    btn.onclick = () => {
      selectedColor = c.key;
      grid.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}

function submitNewEvent() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { document.getElementById('inputName').focus(); return; }
  const id = 'e' + Date.now();
  saveNewEvent({ id, name, emoji: selectedEmoji, colorKey: selectedColor });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr() { return dateStr(new Date()); }
function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function calcStats(records) {
  const now = new Date();
  const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const y = String(now.getFullYear());
  return {
    total: records.length,
    thisYear: records.filter(d => d.startsWith(y)).length,
    thisMonth: records.filter(d => d.startsWith(ym)).length,
  };
}

function setLoading(on) {
  document.getElementById('loadingBar').style.width = on ? '70%' : '100%';
  if (!on) setTimeout(() => { document.getElementById('loadingBar').style.width = '0'; }, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadData();
</script>
