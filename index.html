<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Take it easy</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Take it easy">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.06);
  --border-md: rgba(0,0,0,0.10);
  --text-1: #1A1A1A;
  --text-2: #8A8880;
  --text-3: #C0BDB8;
  --r-card: 20px;
  --r-btn: 100px;
  --shadow: 0 1px 4px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.05);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 660px; margin: 0 auto; padding: 2.25rem 1.25rem 5rem; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.25rem; }
.logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; }
.btn-new {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 18px; border-radius: var(--r-btn);
  border: 0.5px solid var(--border-md);
  background: var(--surface); font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-2); cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.1px;
}
.btn-new:hover { color: var(--text-1); background: var(--bg); }
.btn-new svg { width: 13px; height: 13px; }

/* Cards */
.cards { display: flex; flex-direction: column; gap: 12px; }

.card {
  background: var(--surface);
  border-radius: var(--r-card);
  padding: 1.25rem 1.25rem 1.1rem;
  box-shadow: var(--shadow);
}

/* Card top row */
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.1rem; }
.card-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.card-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.card-meta { min-width: 0; }
.card-name-row { display: flex; align-items: center; gap: 5px; }
.card-name { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
.btn-delete {
  width: 18px; height: 18px; border-radius: 50%;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); opacity: 0; transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
}
.card:hover .btn-delete { opacity: 1; }
.btn-delete:hover { color: #D07070; }
.btn-delete svg { width: 9px; height: 9px; }

.card-stats { display: flex; gap: 10px; margin-top: 3px; }
.stat { font-size: 11px; color: var(--text-2); }
.stat b { font-weight: 500; color: var(--text-1); font-size: 12px; margin-right: 1px; }

/* Checkin button */
.btn-checkin {
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  padding: 7px 15px; border-radius: var(--r-btn);
  border: 0.5px solid var(--border-md);
  background: var(--surface); font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-2); cursor: pointer; transition: all 0.15s;
}
.btn-checkin:hover:not(:disabled) { color: var(--text-1); border-color: rgba(0,0,0,0.18); }
.btn-checkin.done { border-color: transparent; color: var(--text-3); cursor: default; background: transparent; }
.btn-checkin svg { width: 13px; height: 13px; }

/* Heatmap */
.hm-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hm-inner { display: flex; align-items: flex-start; gap: 4px; width: max-content; }
.hm-ylabels { display: flex; flex-direction: column; padding-top: 18px; gap: 2px; }
.hm-ylabel { height: 11px; font-size: 9px; color: var(--text-3); line-height: 11px; width: 16px; }
.hm-grid-wrap { display: flex; flex-direction: column; }
.hm-month-row { display: flex; height: 16px; position: relative; margin-bottom: 2px; }
.hm-month-lbl { position: absolute; font-size: 10px; color: var(--text-2); white-space: nowrap; }
.hm-grid { display: flex; gap: 2px; }
.hm-col { display: flex; flex-direction: column; gap: 2px; }
.hm-cell {
  width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0;
  transition: opacity 0.1s;
}
.hm-cell:hover { opacity: 0.7; }

/* Empty */
.empty {
  text-align: center; padding: 4rem 1rem;
  color: var(--text-3); font-size: 14px; line-height: 2;
}
.empty-icon { font-size: 28px; margin-bottom: 0.75rem; opacity: 0.6; }

/* Modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 1rem;
  opacity: 0; pointer-events: none; transition: opacity 0.18s;
  backdrop-filter: blur(2px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: var(--r-card);
  padding: 1.75rem; width: 100%; max-width: 360px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  transform: translateY(10px) scale(0.98); transition: transform 0.2s;
}
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; letter-spacing: -0.2px; }
.form-row { margin-bottom: 1rem; }
.form-label { font-size: 11px; color: var(--text-2); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 9px 12px; border-radius: 10px;
  border: 0.5px solid var(--border-md);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text-1);
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: rgba(0,0,0,0.25); }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.emoji-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--bg); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.emoji-btn:hover { background: var(--surface); transform: scale(1.08); }
.emoji-btn.selected { box-shadow: 0 0 0 1.5px var(--text-2); background: var(--surface); }
.color-grid { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.color-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid transparent; cursor: pointer; transition: transform 0.1s;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.selected { border-color: var(--text-2); }
.modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
.btn-cancel {
  flex: 1; padding: 10px; border-radius: var(--r-btn);
  border: 0.5px solid var(--border-md);
  background: transparent; font-size: 13px;
  font-family: 'DM Sans', sans-serif; color: var(--text-2); cursor: pointer;
}
.btn-confirm {
  flex: 2; padding: 10px; border-radius: var(--r-btn);
  border: none; background: var(--text-1); color: #fff;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-confirm:hover { opacity: 0.8; }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text-1); color: #fff;
  padding: 8px 18px; border-radius: var(--r-btn);
  font-size: 13px; opacity: 0; transition: all 0.22s;
  pointer-events: none; white-space: nowrap; z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, #B8A8D8, #8EC4A4, #F0A8A8);
  width: 0; transition: width 0.3s; z-index: 300;
}

@media (max-width: 480px) {
  .container { padding: 1.5rem 1rem 4rem; }
  .logo { font-size: 24px; }
  .card { padding: 1rem 1rem 0.9rem; }
}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<div class="container">
  <header class="header">
    <div class="logo">Take it easy</div>
    <button class="btn-new" onclick="openModal()">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="6.5" y1="1.5" x2="6.5" y2="11.5"/><line x1="1.5" y1="6.5" x2="11.5" y2="6.5"/>
      </svg>
      新建事件
    </button>
  </header>
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>新建打卡事件</h2>
    <div class="form-row">
      <label class="form-label">名称</label>
      <input class="form-input" id="inputName" placeholder="例如：架子鼓练习" maxlength="20">
    </div>
    <div class="form-row">
      <label class="form-label">图标</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-row">
      <label class="form-label">颜色</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="submitNewEvent()">创建</button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLHiJPQanEDWJRX-XS1SaQYf1Bb8Q94dan9107J_kijLsd555HFs0fsfYNpLttNNe-/exec';

const COLORS = [
  { on: '#B8A8D8', off: '#EEEAF6', bg: '#F2EFF9', key: 'purple' },
  { on: '#8EC4A4', off: '#E2F0E8', bg: '#EAF4EE', key: 'green'  },
  { on: '#F0A8A8', off: '#FAEAEA', bg: '#FDF2F2', key: 'pink'   },
  { on: '#A8C4D8', off: '#E2EEF5', bg: '#EEF4F8', key: 'blue'   },
  { on: '#B8C89A', off: '#E8EED8', bg: '#F0F4E4', key: 'sage'   },
  { on: '#D4A8C0', off: '#F0E2EC', bg: '#F8EEF4', bg: '#F8EEF4', key: 'rose' },
];

const EMOJIS = ['🥁','💪','📖','🎸','🏃','🧘','✍️','🎨','🎵','🌱','🚴','🏊','🍳','🧠','💻','🎯','🌿','☕','🌈','🎈','🪁'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WEEKS = 26;
const CELL = 13; // 11px + 2px gap

let events = [];
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0].key;

// ── API (JSONP) ───────────────────────────────────────────────────────────────
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now() + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    s.onerror = () => { delete window[cb]; s.remove(); reject(new Error('network')); };
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(s);
  });
}

async function loadData() {
  setLoading(true);
  try {
    const data = await jsonp(APPS_SCRIPT_URL + '?action=getAll');
    events = (data.events || []).map(ev => ({
      ...ev,
      records: (ev.records || []).map(r => normalizeDate(r))
    }));
    renderAll();
  } catch(e) {
    showToast('加载失败，请检查网络');
    console.error(e);
  } finally {
    setLoading(false);
  }
}

// Normalize any date format to YYYY-MM-DD
function normalizeDate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Try parsing
  const d = new Date(s);
  if (!isNaN(d)) return fmtDate(d);
  return s;
}

function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function todayStr() { return fmtDate(new Date()); }

async function doCheckin(eventId) {
  const today = todayStr();
  const ev = events.find(e => e.id === eventId);
  if (!ev || ev.records.includes(today)) return;
  ev.records.push(today);
  renderAll();
  try {
    await jsonp(APPS_SCRIPT_URL + '?action=checkin&eventId=' + encodeURIComponent(eventId) + '&date=' + today);
    showToast('✓ 打卡成功');
  } catch(e) {
    ev.records = ev.records.filter(d => d !== today);
    renderAll();
    showToast('打卡失败，请重试');
  }
}

async function deleteEvent(eventId) {
  if (!confirm('确认删除这个打卡事件？')) return;
  events = events.filter(e => e.id !== eventId);
  renderAll();
  try { await jsonp(APPS_SCRIPT_URL + '?action=deleteEvent&eventId=' + encodeURIComponent(eventId)); }
  catch(e) { showToast('删除失败'); }
}

async function saveNewEvent(ev) {
  events.push({ ...ev, records: [] });
  closeModal();
  renderAll();
  try {
    const url = APPS_SCRIPT_URL + '?action=createEvent' +
      '&id=' + encodeURIComponent(ev.id) +
      '&name=' + encodeURIComponent(ev.name) +
      '&emoji=' + encodeURIComponent(ev.emoji) +
      '&colorKey=' + encodeURIComponent(ev.colorKey);
    await jsonp(url);
    showToast('✓ 创建成功');
  } catch(e) { showToast('创建失败，请重试'); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  const c = document.getElementById('cardsContainer');
  c.innerHTML = '';
  if (!events.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div>还没有打卡事件<br>点右上角创建第一个</div>`;
    return;
  }
  events.forEach(ev => c.appendChild(buildCard(ev)));
  events.forEach(ev => renderHeatmap(ev));
}

function buildCard(ev) {
  const color = COLORS.find(c => c.key === ev.colorKey) || COLORS[0];
  const today = todayStr();
  const done = ev.records.includes(today);
  const stats = calcStats(ev.records);

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + ev.id;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-left">
        <div class="card-icon" style="background:${color.bg}">${ev.emoji}</div>
        <div class="card-meta">
          <div class="card-name-row">
            <div class="card-name">${ev.name}</div>
            <button class="btn-delete" onclick="deleteEvent('${ev.id}')">
              <svg viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="1" y1="1" x2="8" y2="8"/><line x1="8" y1="1" x2="1" y2="8"/>
              </svg>
            </button>
          </div>
          <div class="card-stats">
            <span class="stat"><b>${stats.month}</b>本月</span>
            <span class="stat"><b>${stats.year}</b>今年</span>
            <span class="stat"><b>${stats.total}</b>总计</span>
          </div>
        </div>
      </div>
      <button class="btn-checkin ${done ? 'done' : ''}" onclick="doCheckin('${ev.id}')" ${done ? 'disabled' : ''}>
        ${done
          ? `<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,7 5,10 11,3"/></svg>今日已打卡`
          : `<svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="5"/><polyline points="4,6.5 6,8.5 9.5,4.5"/></svg>打卡`
        }
      </button>
    </div>
    <div id="hm-${ev.id}"></div>
  `;
  return card;
}

function renderHeatmap(ev) {
  const wrap = document.getElementById('hm-' + ev.id);
  if (!wrap) return;
  const color = COLORS.find(c => c.key === ev.colorKey) || COLORS[0];
  const recordSet = new Set(ev.records);
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayFull = todayStr();

  // Start from WEEKS*7 days ago, go back to the nearest Sunday
  const start = new Date(today);
  start.setDate(today.getDate() - WEEKS * 7 + 1);
  // Align to Sunday (go back to previous Sunday)
  start.setDate(start.getDate() - start.getDay());

  // Build weeks
  const totalWeeks = WEEKS + 1;
  let monthLabels = [];
  let lastMonth = -1;
  const cols = [];

  for (let w = 0; w < totalWeeks; w++) {
    const weekDates = [];
    for (let d = 0; d < 7; d++) {
      const dt = new Date(start);
      dt.setDate(start.getDate() + w * 7 + d);
      weekDates.push(dt);
    }
    cols.push(weekDates);
    // Month label: label the week if it contains the 1st of the month
    const mo = weekDates[0].getMonth();
    if (mo !== lastMonth) {
      monthLabels.push({ col: w, label: MONTH_SHORT[mo] });
      lastMonth = mo;
    }
  }

  // Month labels row
  let mlHTML = monthLabels.map(ml =>
    `<span class="hm-month-lbl" style="left:${ml.col * CELL}px">${ml.label}</span>`
  ).join('');

  // Grid
  let gridHTML = cols.map(week => {
    const cells = week.map(dt => {
      const ds = fmtDate(dt);
      const future = dt > today;
      const checked = recordSet.has(ds);
      const isToday = ds === todayFull;
      let bg = future ? 'transparent' : checked ? color.on : color.off;
      let extra = isToday ? `box-shadow:0 0 0 1.5px ${color.on};` : '';
      return `<div class="hm-cell" style="background:${bg};${extra}" title="${ds}"></div>`;
    }).join('');
    return `<div class="hm-col">${cells}</div>`;
  }).join('');

  // Row labels: blank, Mo, blank, We, blank, Fr, blank
  const rowLabels = ['','Mo','','We','','Fr',''].map(l =>
    `<div class="hm-ylabel">${l}</div>`
  ).join('');

  wrap.innerHTML = `
    <div class="hm-outer">
      <div class="hm-inner">
        <div class="hm-ylabels">${rowLabels}</div>
        <div class="hm-grid-wrap">
          <div class="hm-month-row" style="width:${totalWeeks*CELL}px">${mlHTML}</div>
          <div class="hm-grid">${gridHTML}</div>
        </div>
      </div>
    </div>
  `;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function calcStats(records) {
  const now = new Date();
  const ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const y = String(now.getFullYear());
  return {
    total: records.length,
    year: records.filter(d => d.startsWith(y)).length,
    month: records.filter(d => d.startsWith(ym)).length,
  };
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  selectedEmoji = EMOJIS[0]; selectedColor = COLORS[0].key;
  document.getElementById('inputName').value = '';
  buildEmojiGrid(); buildColorGrid();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 200);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function buildEmojiGrid() {
  const g = document.getElementById('emojiGrid'); g.innerHTML = '';
  EMOJIS.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-btn' + (em === selectedEmoji ? ' selected' : '');
    b.textContent = em;
    b.onclick = () => { selectedEmoji = em; g.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };
    g.appendChild(b);
  });
}
function buildColorGrid() {
  const g = document.getElementById('colorGrid'); g.innerHTML = '';
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'color-btn' + (c.key === selectedColor ? ' selected' : '');
    b.style.background = c.on;
    b.onclick = () => { selectedColor = c.key; g.querySelectorAll('.color-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };
    g.appendChild(b);
  });
}
function submitNewEvent() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { document.getElementById('inputName').focus(); return; }
  saveNewEvent({ id: 'e' + Date.now(), name, emoji: selectedEmoji, colorKey: selectedColor });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loadingBar').style.width = on ? '65%' : '100%';
  if (!on) setTimeout(() => document.getElementById('loadingBar').style.width = '0', 300);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

loadData();
</script>
</body>
</html>
